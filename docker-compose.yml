version: "3.8"

services:
  music-grabber:
    build: .
    container_name: music_grabber
    restart: unless-stopped
    ports:
      - "8010:8010"
    volumes:
      - ./app:/app/app
      - ./users:/app/users
      # Mount the user's music storage path directly inside the container.
      # This allows absolute paths like "/mnt/mypassport/data/media/music" to resolve seamlessly.
      - /mnt/mypassport/data/media/music:/mnt/mypassport/data/media/music
      # Fallback downloads volume if relative paths are used
      - ./downloads:/app/downloads
    environment:
      - TZ=Asia/Kolkata
